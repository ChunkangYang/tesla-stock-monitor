# Checks the Tesla shop product page for stock and notifies via Telegram.
# NOTE: schedule trigger disabled - GitHub Actions runner IPs (datacenter/cloud
# ranges) are blocked outright by Akamai regardless of headed/headless mode,
# unlike a residential home IP. Kept as manual-only for reference/debugging.
# The working monitor runs locally via Windows Task Scheduler instead.
name: Tesla Stock Monitor

on:
  workflow_dispatch: {}

concurrency:
  group: tesla-stock-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Google Chrome and Xvfb
        run: |
          curl -fsSL https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -o /tmp/chrome.deb
          sudo apt-get update
          sudo apt-get install -y /tmp/chrome.deb xvfb

      - name: Run stock check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: xvfb-run -a node monitor.js

      - name: Commit state change if any
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name "tesla-stock-monitor-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "update stock state"
            git push
          fi
